<!DOCTYPE html>
<html>

<head>
    <title>Satellite Collision Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Satellite Collision Detection</h1>

    <div class="container">

        <h2>Satellite A</h2>
        <input placeholder="Position">
        <input placeholder="Velocity">

        <h2>Satellite B</h2>
        <input placeholder="Position">
        <input placeholder="Velocity">

        <h2>Orbit Visualization</h2>
        <canvas id="spaceCanvas" width="500" height="400"></canvas>

        <button id="checkBtn">Check Collision</button>

        <div id="result">
            <h3>Result</h3>
            <p>Collision Risk: --</p>
            <p>Suggested Maneuver: --</p>
            <p>Fuel Required: --</p>
        </div>

        <div id="info">
            <h3>System Status</h3>
            <p>Satellite A: Active</p>
            <p>Satellite B: Active</p>
            <p>Space Debris: Monitoring</p>
            <p>Orbit Status: Stable</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
